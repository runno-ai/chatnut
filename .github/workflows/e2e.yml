name: E2E

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  e2e:
    name: E2E Install & MCP
    runs-on: macos-latest
    timeout-minutes: 10
    env:
      CHATNUT_OPEN_BROWSER: "0"  # suppress auto-open in CI
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      # --- Install toolchain ---
      - uses: astral-sh/setup-uv@v5

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      # --- Step 1: Install from source (tests HEAD, not PyPI) ---
      - name: Install chatnut from source
        run: uv tool install ./app/be

      # --- Step 2: Verify install ---
      - name: Verify chatnut CLI
        run: |
          which chatnut
          chatnut --help
          chatnut open --help

      - name: Register MCP with Claude Code
        run: |
          BIN=$(which chatnut)
          claude mcp add chatnut -- "$BIN"
          claude mcp list 2>&1 | tee /tmp/mcp-list.txt
          grep -q "chatnut" /tmp/mcp-list.txt

      # --- Step 3: Headless Claude calls MCP tools ---
      - name: Test ping via headless Claude
        run: |
          claude -p \
            --model sonnet \
            --output-format json \
            --dangerously-skip-permissions \
            "Call the chatnut ping tool. Return only the raw JSON result, nothing else." \
            | tee /tmp/ping-result.json

          # Verify ping response — Claude wraps in JSON envelope
          python3 -c "
          import json, sys
          with open('/tmp/ping-result.json') as f:
              envelope = json.load(f)
          assert not envelope.get('is_error'), f'Tool call failed: {envelope.get(\"result\", \"\")[:200]}'
          result = envelope['result']
          assert '\"status\"' in result and '\"ok\"' in result, f'ping missing status ok: {result[:200]}'
          print('ping: OK')
          "

      - name: Test init_room via headless Claude
        run: |
          claude -p \
            --model sonnet \
            --output-format json \
            --dangerously-skip-permissions \
            "Call the chatnut init_room tool with project='ci-e2e' and name='smoke-test' and description='E2E CI test'. Return only the raw JSON result." \
            | tee /tmp/init-result.json

          # Verify init_room response — Claude wraps in JSON envelope
          python3 -c "
          import json, sys
          with open('/tmp/init-result.json') as f:
              envelope = json.load(f)
          assert not envelope.get('is_error'), f'Tool call failed: {envelope.get(\"result\", \"\")[:200]}'
          result = envelope['result']
          assert 'ci-e2e' in result, f'init_room missing project: {result[:200]}'
          assert 'smoke-test' in result, f'init_room missing name: {result[:200]}'
          print('init_room: OK')
          "

      # --- Step 4: Verify DB directly ---
      - name: Verify DB state
        run: |
          DB="$HOME/.chatnut/chatnut.db"
          echo "DB path: $DB"
          ls -la "$DB"

          # Verify room exists
          ROOM=$(sqlite3 "$DB" "SELECT id, project, name, status FROM rooms WHERE project='ci-e2e' AND name='smoke-test'")
          echo "Room: $ROOM"
          [ -n "$ROOM" ] || { echo "FAIL: room not found in DB"; exit 1; }

          # Verify room is live
          echo "$ROOM" | grep -q "live" || { echo "FAIL: room not live"; exit 1; }

          echo "DB verification: OK"

      - name: Verify server port file
        run: |
          PORT_FILE="$HOME/.chatnut/server.port"
          [ -f "$PORT_FILE" ] || { echo "FAIL: server.port not found"; exit 1; }
          PORT=$(cat "$PORT_FILE")
          echo "Server running on port: $PORT"

          # Health check
          curl -sf "http://127.0.0.1:${PORT}/api/status" | python3 -m json.tool
          echo "Health check: OK"
